apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- pod.yaml

secretGenerator:
- name: app-tls
  files:
  - "tls.crt"
  - "tls.key"
  type: "kubernetes.io/tls"

configMapGenerator:
- name: app-whatever
  files:
  - myFileName.ini=whatever.ini

- name: my-application-properties
  files:
  - app.properties
