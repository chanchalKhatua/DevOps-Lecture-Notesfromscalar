apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: default
  labels:
    name: frontend
    app: demo
spec:
  containers:
  - name: cont-fe
    image: nginx
---

apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: default
  labels:
    name: backend
    app: demo
spec:
  containers:
  - name: cont-be
    image: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: pod-svc
spec:
  selector:
    app: demo
  ports:
  - port: 80
    targetPort: 80
