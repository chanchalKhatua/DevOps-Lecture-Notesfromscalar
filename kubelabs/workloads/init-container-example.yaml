# Init Container Example
# Pod with init container that runs before main container

apiVersion: v1
kind: Pod
metadata:
  name: red
  namespace: default
spec:
  initContainers:
  - image: busybox
    name: red-initcontainer
    command: [ "sleep", "20" ]
  containers:
  - command:
    - sh
    - -c
    - echo The app is running! && sleep 3600
    image: busybox:1.28
    name: red-container
