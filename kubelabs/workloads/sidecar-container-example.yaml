# Sidecar Container Pattern
# Main container (nginx) with sidecar for log processing

apiVersion: v1
kind: Pod
metadata:
  name: webserver
  labels:
    run: webserver
spec:
  volumes:
  - name: shared-logs
    emptyDir: {}
  containers:
  # Main application container
  - name: nginx-container
    image: nginx:latest
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log/nginx
  # Sidecar container for log processing
  - name: sidecar-container
    image: ubuntu:latest
    command: [ "sh", "-c", "while true; do cat /var/log/nginx/access.log /var/log/nginx/error.log; sleep 30; done" ]
    volumeMounts:
    - name: shared-logs
      mountPath: /var/log/nginx
