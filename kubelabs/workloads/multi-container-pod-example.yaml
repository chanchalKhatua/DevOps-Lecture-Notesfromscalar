# Multi-container Pod Example
# Two containers sharing the same pod

apiVersion: v1
kind: Pod
metadata:
  labels:
    run: yellow
  name: yellow
spec:
  containers:
  - image: redis
    name: gold
  - image: busybox
    name: lemon
    command: [ "sleep", "1000" ]
  dnsPolicy: ClusterFirst
  restartPolicy: Always
