# Deployment with NodePort Service
# Complete application deployment with external access
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nodeapp-deployment
  name: nodeapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodeapp-deployment
  template:
    metadata:
      labels:
        app: nodeapp-deployment
    spec:
      containers:
      - image: gcr.io/kodekloud/centos-ssh-enabled:node
        name: nodeapp-deployment-container
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nodeapp-deployment
  name: nodeapp-service
spec:
  type: NodePort
  ports:
  - port: 8080
    protocol: TCP
    nodePort: 30012
    targetPort: 8080
  selector:
    app: nodeapp-deployment
